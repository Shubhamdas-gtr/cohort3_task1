<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokemon</title>
    <link rel="stylesheet" href="style.css">
    <link
    href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css"
    rel="stylesheet"
                    />

</head>
<body>

    <div class = "container">
        <header>
            <button class = "icon-btn">☰</button>

            <img 
            class = "logo" 
            src = "./Pokemon-Logo.png" alt = "logo">

            <button class="icon-btn">
                <i class="ri-search-line"></i>
            </button>

        </header>

        <section class = "search-section">
            <input type="text"
            placeholder="search for a pokemon...">
            
            <select>
                <option class=""> filter by type</option>
                <option class="Fire">Fire</option>
                <option class="Water">Water</option>
                <option class="Grass">Grass</option>
                <option class="Dark">Dark</option>
            </select>


        </section>

        <section class = "card-grid">
            <div class = "card">
                <img src="https://tse4.mm.bing.net/th/id/OIP.HmaGi1cCJADnx-ecHTQlDQHaHa?r=0&rs=1&pid=ImgDetMain&o=7&rm=3">
                <h2>Meowscarada</h2>

                <span class = "type">Grass</span>
            </div>

            <div class = "card">
                <img src="https://i.pinimg.com/originals/92/32/8c/92328cf70539aa9179d662c2b5c08ace.jpg">
                <h2>houndoom</h2>

                <span class = "type">fire</span>
            </div>

            <div class = "card">
                <img src="https://www.pngmart.com/files/22/Pawniard-Pokemon-PNG-Photo.png">
                <h2>pawniard</h2>

                <span class = "type">dark</span>
            </div>

            <div class = "card">
                <img src="https://img.pokemondb.net/artwork/large/inkay.jpg">
                <h2>Inkay</h2>

                <span class = "type">water</span>
            </div>

        </section>

    </div>
    
</body>
</html>
